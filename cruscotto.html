<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cruscotto del Dirigente — La strada e i pesi</title>
<link rel="icon" href="logo.jpg" />
<style>
  :root{
    --carta:#faf7f1; --blu:#1f5673; --blu-scuro:#164055; --oro:#B8860B;
    --inchiostro:#2a2f38; --tenue:#6b7482; --bordo:#e4ddd0;
  }
  *{box-sizing:border-box;}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;max-width:960px;margin:0 auto;padding:28px 20px 90px;color:var(--inchiostro);line-height:1.6;background:var(--carta);}
  .brand-logo{display:block;height:60px;width:auto;}
  h1{font-size:1.55rem;color:var(--blu-scuro);margin:14px 0 4px;}
  .occhiello{color:var(--tenue);font-size:.95rem;margin:0 0 20px;}
  p{margin:.5em 0;}

  /* --- Accesso --- */
  .accesso{max-width:420px;margin:36px auto 0;background:#fff;border:1px solid var(--bordo);border-radius:14px;padding:26px 26px 30px;text-align:center;box-shadow:0 10px 30px rgba(22,64,85,.06);}
  .accesso .lucchetto{width:46px;height:46px;margin-bottom:6px;}
  .accesso h2{font-size:1.1rem;color:var(--blu-scuro);margin:0 0 4px;}
  .accesso p{font-size:.9rem;color:var(--tenue);margin:0 0 18px;}
  .accesso input[type=password]{width:100%;font-size:1.05rem;padding:12px 14px;border:1px solid var(--bordo);border-radius:10px;background:#fff;text-align:center;}
  .accesso button{width:100%;font-size:1.05rem;font-weight:600;color:#fff;background:var(--blu);border:none;border-radius:10px;padding:13px;cursor:pointer;margin-top:14px;}
  .accesso button:hover{background:var(--blu-scuro);}
  .accesso button:disabled{opacity:.6;cursor:default;}
  .msg{margin-top:14px;font-size:.92rem;font-weight:600;color:var(--oro);min-height:1.2em;}
  .config{max-width:520px;margin:30px auto 0;background:#fffdf8;border-left:4px solid var(--oro);border-radius:8px;padding:16px 20px;font-size:.92rem;}
  .config code{background:#f0ece3;padding:1px 5px;border-radius:4px;font-size:.9em;}

  /* --- Dashboard --- */
  .barra{display:none;flex-wrap:wrap;gap:8px;align-items:center;margin:22px 0 8px;padding-bottom:14px;border-bottom:1px solid var(--bordo);}
  .barra.on{display:flex;}
  .barra .sep{flex:1 1 auto;}
  button.ghost{background:transparent;color:var(--blu);border:1px solid var(--bordo);padding:8px 16px;font-size:.9rem;border-radius:10px;cursor:pointer;}
  button.ghost.on{background:var(--blu);color:#fff;border-color:var(--blu);}
  button.ghost:hover{border-color:var(--blu);}
  select,.cerca{font-size:.9rem;padding:8px 10px;border:1px solid var(--bordo);border-radius:8px;background:#fff;color:var(--inchiostro);}
  .conteggio{font-size:.9rem;color:var(--tenue);margin:6px 0 0;}
  .azioni-top{display:none;gap:10px;align-items:center;margin-top:6px;}
  .azioni-top.on{display:flex;}
  .link-lieve{font-size:.85rem;color:var(--blu);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0;}
  .esito{margin-top:8px;}
  .scheda{background:#fff;border:1px solid var(--bordo);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
  .scheda .testa{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 12px;border-bottom:1px solid var(--bordo);padding-bottom:10px;margin-bottom:12px;}
  .scheda .chi{font-family:"Lexend",sans-serif;font-weight:600;font-size:1.1rem;color:var(--blu-scuro);}
  .tag{font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;font-weight:700;color:var(--blu);background:#eef3f6;border-radius:999px;padding:3px 10px;}
  .tag.oro{color:#8a6608;background:#faf3e0;}
  .quando{font-size:.8rem;color:var(--tenue);margin-left:auto;}
  .voce{margin:12px 0;}
  .voce .k{font-weight:700;color:var(--blu-scuro);font-size:.8rem;text-transform:uppercase;letter-spacing:.03em;}
  .voce .t{white-space:pre-wrap;margin-top:3px;}
  .tema-blocco{margin-bottom:26px;}
  .tema-blocco > .titolo{font-family:"Lexend",sans-serif;font-size:1.15rem;color:var(--blu-scuro);border-bottom:2px solid var(--oro);padding-bottom:6px;margin-bottom:12px;}
  .risposta{background:#fff;border:1px solid var(--bordo);border-left:3px solid var(--blu);border-radius:8px;padding:12px 16px;margin-bottom:10px;}
  .risposta .fonte{font-size:.8rem;color:var(--tenue);margin-bottom:4px;font-weight:600;}
  .risposta .t{white-space:pre-wrap;}
  .err{color:var(--oro);font-weight:700;margin-top:12px;}
  .vuoto{color:var(--tenue);font-style:italic;}

  /* --- Intestazione di stampa (nascosta a schermo) --- */
  .stampa-intestazione{display:none;}

  /* --- PDF / Stampa --- */
  @media print{
    @page{margin:15mm;}
    body{background:#fff;color:#000;max-width:none;margin:0;padding:0;}
    .brand-logo,.occhiello,h1,.accesso,.config,.barra,.azioni-top,.conteggio,.vuoto{display:none !important;}
    .stampa-intestazione{display:block !important;margin-bottom:18px;border-bottom:2px solid #B8860B;padding-bottom:10px;}
    .pt-logo{height:52px;width:auto;display:block;margin-bottom:8px;}
    .pt-titolo{font-family:"Lexend",sans-serif;font-size:1.25rem;color:#164055;margin:0;}
    .pt-meta{font-size:.82rem;color:#555;margin:3px 0 0;}
    .esito{margin-top:0;}
    .scheda{border:1px solid #d8d2c6;border-radius:10px;box-shadow:none;padding:14px 16px;margin-bottom:12px;break-inside:avoid;page-break-inside:avoid;}
    .risposta{box-shadow:none;break-inside:avoid;page-break-inside:avoid;}
    .tema-blocco > .titolo{break-after:avoid;page-break-after:avoid;}
    .voce .t,.risposta .t{color:#1a1a1a;}
  }
</style>
</head>

  const ETICHETTE = {
    nome:"Nome", sezione:"Scuola", anni:"Anni nella scuola",
    fragili:"I ragazzi fragili",

    comunicazione:"La comunicazione interna",
    gratificazione:"Essere visti",
    chiusura:"Per chiudere (strada / pesi)",
    libero:"Libero", inviatoIl:"Inviato il"
  };
  const TEMI = ["fragili","famiglie","comunicazione","gratificazione","chiusura","libero"];

  let privKey = null;
  let relazioni = [];
  let vista = "persona";

  function b64ToBuf(b64){
    const s = atob(String(b64).trim());
    const b = new Uint8Array(s.length);
    for(let i=0;i<s.length;i++) b[i] = s.charCodeAt(i);
    return b.buffer;
  }

  // --- Sblocca la chiave privata con la password ---
  async function sbloccaChiave(password){
    const P = CHIAVE_PRIVATA_PROTETTA;
    const enc = new TextEncoder();
    const base = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
    const aes = await crypto.subtle.deriveKey(
      {name:"PBKDF2", salt:new Uint8Array(b64ToBuf(P.salt)), iterations:P.iter||250000, hash:"SHA-256"},
      base, {name:"AES-GCM", length:256}, false, ["decrypt"]);
    const jwkBuf = await crypto.subtle.decrypt(
      {name:"AES-GCM", iv:new Uint8Array(b64ToBuf(P.iv))}, aes, b64ToBuf(P.dati)); // errore = password sbagliata
    const jwk = JSON.parse(new TextDecoder().decode(jwkBuf));
    return crypto.subtle.importKey("jwk", jwk, {name:"RSA-OAEP", hash:"SHA-256"}, false, ["decrypt"]);
  }

  // --- Scarica le relazioni dal foglio via JSONP ---
  function scaricaDalFoglio(){
    return new Promise((res, rej)=>{
      const cb = "jsonp_" + Date.now() + "_" + Math.floor(Math.random()*1e6);
      const s = document.createElement("script");
      let fatto = false;
      const pulisci = ()=>{ try{ delete window[cb]; }catch(e){} s.remove(); };
      window[cb] = (data)=>{ fatto = true; pulisci(); res(data); };
      s.onerror = ()=>{ if(!fatto){ pulisci(); rej(new Error("connessione al foglio non riuscita")); } };
      s.src = SCRIPT_URL + "?callback=" + cb + "&token=" + encodeURIComponent(TOKEN_LETTURA) + "&_=" + Date.now();
      document.body.appendChild(s);
      setTimeout(()=>{ if(!fatto){ pulisci(); rej(new Error("tempo scaduto: controlla la connessione")); } }, 20000);
    });
  }

  async function decifraRiga(riga){
    const rawAes = await crypto.subtle.decrypt({name:"RSA-OAEP"}, privKey, b64ToBuf(riga.chiave));
    const aes = await crypto.subtle.importKey("raw", rawAes, {name:"AES-GCM"}, false, ["decrypt"]);
    const iv = new Uint8Array(b64ToBuf(riga.iv));
    const chiaro = await crypto.subtle.decrypt({name:"AES-GCM", iv}, aes, b64ToBuf(riga.dati));
    const o = JSON.parse(new TextDecoder().decode(chiaro));
    o.__ricevuto = riga.ricevuto;
    return o;
  }

  async function caricaEDecifra(){
    const risposta = await scaricaDalFoglio();
    if(!risposta || !risposta.ok) throw new Error((risposta && risposta.errore) || "il foglio ha rifiutato la richiesta (token?)");
    const righe = risposta.righe || [];
    relazioni = [];
    let saltate = 0;
    for(const riga of righe){
      try{ relazioni.push(await decifraRiga(riga)); }
      catch(e){ saltate++; }
    }
    return {totali: righe.length, saltate};
  }

  // --- Rendering ---
  function esc(s){ const d=document.createElement("div"); d.textContent = s==null?"":String(s); return d.innerHTML; }
  function formattaData(iso){
    try{ return new Date(iso).toLocaleString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
    catch(e){ return iso; }
  }
  function riempi(id, primo, valori){
    const sel = document.getElementById(id);
    const attuale = sel.value;
    sel.innerHTML = '<option value="">'+primo+'</option>';
    valori.forEach(v => { const o = document.createElement("option"); o.value = v; o.textContent = v; sel.appendChild(o); });
    sel.value = attuale;
  }
  function preparaFiltri(){
    const sez = new Set(), ann = new Set();
    relazioni.forEach(r => { if(r.sezione) sez.add(r.sezione); if(r.anni) ann.add(r.anni); });
    riempi("fSezione", "Tutte le scuole", [...sez]);
    riempi("fAnni", "Tutte le anzianità", [...ann]);
  }
  function filtrate(){
    const fs = document.getElementById("fSezione").value;
    const fa = document.getElementById("fAnni").value;
    const q  = document.getElementById("cerca").value.trim().toLowerCase();
    return relazioni.filter(r=>{
      if(fs && r.sezione !== fs) return false;
      if(fa && r.anni !== fa) return false;
      if(q){ if(!Object.values(r).join(" ").toLowerCase().includes(q)) return false; }
      return true;
    });
  }
  function disegna(){
    const esito = document.getElementById("esito");
    const dati = filtrate();
    document.getElementById("conteggio").textContent =
      dati.length + " di " + relazioni.length + " relazioni" + (esito.dataset.note || "");
    esito.innerHTML = "";
    if(dati.length === 0){ esito.innerHTML = '<p class="vuoto">Nessuna relazione con questi filtri.</p>'; return; }
    if(vista === "persona") disegnaPersona(esito, dati);
    else disegnaTema(esito, dati);
  }
  function disegnaPersona(cont, dati){
    dati.forEach(r=>{
      const s = document.createElement("div");
      s.className = "scheda";
      let html = '<div class="testa"><span class="chi">' + esc(r.nome || "Senza nome") + '</span>';
      if(r.sezione) html += '<span class="tag">' + esc(r.sezione) + '</span>';
      if(r.anni) html += '<span class="tag oro">' + esc(r.anni) + '</span>';
      if(r.inviatoIl) html += '<span class="quando">' + esc(formattaData(r.inviatoIl)) + '</span>';
      html += '</div>';
      for(const k of TEMI){
        if(r[k] && String(r[k]).trim()){
          html += '<div class="voce"><div class="k">' + esc(ETICHETTE[k]) + '</div><div class="t">' + esc(r[k]) + '</div></div>';
        }
      }
      s.innerHTML = html;
      cont.appendChild(s);
    });
  }
  function disegnaTema(cont, dati){
    for(const k of TEMI){
      const conRisposta = dati.filter(r => r[k] && String(r[k]).trim());
      if(conRisposta.length === 0) continue;
      const blocco = document.createElement("div");
      blocco.className = "tema-blocco";
      let html = '<div class="titolo">' + esc(ETICHETTE[k]) + ' <span style="font-weight:400;font-size:.85rem;color:var(--tenue)">(' + conRisposta.length + ')</span></div>';
      conRisposta.forEach(r=>{
        const chi = [r.nome || "Senza nome", r.sezione].filter(Boolean).join(" · ");
        html += '<div class="risposta"><div class="fonte">' + esc(chi) + '</div><div class="t">' + esc(r[k]) + '</div></div>';
      });
      blocco.innerHTML = html;
      cont.appendChild(blocco);
    }
  }

  // --- Flusso di accesso ---
  function configMancante(){
    if(!CHIAVE_PRIVATA_PROTETTA) return "manca la chiave protetta";
    if(!TOKEN_LETTURA) return "manca il token di lettura";
    if(!SCRIPT_URL) return "manca l'indirizzo del foglio";
    return null;
  }

  function mostraConfig(){
    const c = document.getElementById("config");
    c.hidden = false;
    c.innerHTML = "<strong>Configurazione incompleta.</strong> Prima di usare il cruscotto: " +
      "1) apri <code>genera-chiavi.html</code>, proteggi la tua chiave con una password e incolla il blocco al posto di <code>const CHIAVE_PRIVATA_PROTETTA = null;</code>; " +
      "2) scegli un token casuale e mettilo sia in <code>apps-script.gs</code> (<code>TOKEN_LETTURA</code>) sia qui (<code>const TOKEN_LETTURA</code>); " +
      "3) ridistribuisci il Web App.";
  }

  async function entra(){
    const msg = document.getElementById("msg");
    const btn = document.getElementById("entra");
    const pwd = document.getElementById("pwd").value;
    msg.textContent = "";
    const mancante = configMancante();
    if(mancante){ msg.textContent = "Configurazione: " + mancante + "."; mostraConfig(); return; }
    if(!pwd){ msg.textContent = "Inserisci la password."; return; }
    if(!(window.crypto && crypto.subtle)){ msg.textContent = "Apri la pagina via https (o localhost)."; return; }
    btn.disabled = true; msg.textContent = "Apertura…";
    try{
      privKey = await sbloccaChiave(pwd);
    }catch(e){
      btn.disabled = false; msg.textContent = "Password errata."; return;
    }
    msg.textContent = "Scarico le relazioni…";
    try{
      const info = await caricaEDecifra();
      const note = [];
      if(info.saltate) note.push(info.saltate + " riga/e non leggibili (es. prove)");
      document.getElementById("esito").dataset.note = note.length ? " · " + note.join(" · ") : "";
      apriDashboard();
      if(relazioni.length === 0){
        document.getElementById("esito").innerHTML = '<p class="vuoto">Nessuna relazione ancora ricevuta.</p>';
        document.getElementById("conteggio").textContent = "0 relazioni" + (document.getElementById("esito").dataset.note||"");
      }else{
        preparaFiltri();
        disegna();
      }
    }catch(e){
      btn.disabled = false; privKey = null; msg.textContent = "Non riesco a leggere il foglio: " + e.message;
    }
  }

  function apriDashboard(){
    document.getElementById("accesso").style.display = "none";
    document.getElementById("config").hidden = true;
    document.getElementById("azioniTop").classList.add("on");
    document.getElementById("barra").classList.add("on");
  }
  function esci(){
    privKey = null; relazioni = [];
    document.getElementById("pwd").value = "";
    document.getElementById("entra").disabled = false;
    document.getElementById("msg").textContent = "";
    document.getElementById("esito").innerHTML = "";
    document.getElementById("conteggio").textContent = "";
    document.getElementById("azioniTop").classList.remove("on");
    document.getElementById("barra").classList.remove("on");
    document.getElementById("accesso").style.display = "";
  }
  async function aggiorna(){
    if(!privKey) return;
    const conteggio = document.getElementById("conteggio");
    conteggio.textContent = "Aggiorno…";
    try{
      const info = await caricaEDecifra();
      const note = [];
      if(info.saltate) note.push(info.saltate + " riga/e non leggibili (es. prove)");
      document.getElementById("esito").dataset.note = note.length ? " · " + note.join(" · ") : "";
      preparaFiltri();
      disegna();
    }catch(e){ conteggio.textContent = "Aggiornamento non riuscito: " + e.message; }
  }

  function exportaPdf(){
    if(!privKey || relazioni.length === 0){ return; }
    const dati = filtrate();
    const fs = document.getElementById("fSezione").value;
    const fa = document.getElementById("fAnni").value;
    const q  = document.getElementById("cerca").value.trim();
    const filtri = [];
    if(fs) filtri.push("Scuola: " + fs);
    if(fa) filtri.push("Anzianità: " + fa);
    if(q)  filtri.push('Ricerca: “' + q + '”');
    const vistaTxt = vista === "persona" ? "per docente" : "per tema";
    const oggi = new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"});
    let meta = "Scuola Sacra Famiglia · " + oggi + " · " + dati.length + " di " + relazioni.length + " relazioni · vista " + vistaTxt;
    if(filtri.length) meta += " · " + filtri.join(" · ");
    const testa = document.getElementById("stampaIntestazione");
    testa.innerHTML =
      '<img class="pt-logo" src="logo.jpg" alt="Scuola Sacra Famiglia" />' +
      '<p class="pt-titolo">La strada e i pesi — Relazioni dei docenti</p>' +
      '<p class="pt-meta">' + esc(meta) + '</p>';
    window.print();
  }

  // Eventi
  document.getElementById("entra").addEventListener("click", entra);
  document.getElementById("pdf").addEventListener("click", exportaPdf);
  document.getElementById("pwd").addEventListener("keydown", (e)=>{ if(e.key === "Enter") entra(); });
  document.getElementById("esci").addEventListener("click", esci);
  document.getElementById("aggiorna").addEventListener("click", aggiorna);
  ["fSezione","fAnni"].forEach(id => document.getElementById(id).addEventListener("change", disegna));
  document.getElementById("cerca").addEventListener("input", disegna);
  document.querySelectorAll(".barra .ghost[data-vista]").forEach(b=>{
    b.addEventListener("click", ()=>{
      vista = b.dataset.vista;
      document.querySelectorAll(".barra .ghost[data-vista]").forEach(x => x.classList.toggle("on", x === b));
      disegna();
    });
  });

  if(configMancante()) mostraConfig();
</script>
</body>
</html>
